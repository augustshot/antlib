<!DOCTYPE html>
<html lang="ru"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Мои коллекции</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link th:href="@{/css/collections.css}" rel="stylesheet"/>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<div class="container mt-4">
    <!-- Заголовок и кнопка добавления -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success mb-0">Мои коллекции</h2>
        <a th:href="@{/collections/add}" class="btn btn-outline-success px-4 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Создать коллекцию
        </a>
    </div>

    <!-- Список коллекций -->
    <div th:if="${collections != null and !collections.isEmpty()}">
        <div class="row g-4">
            <div th:each="collection : ${collections}" class="col-md-6 col-lg-4">
                <div class="card collection-card h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title text-success mb-0" th:text="${collection.name}">Название коллекции</h5>
                        </div>
                        <p class="card-text text-muted small" th:text="${collection.description}">Описание коллекции</p>

                        <hr class="my-3">

                        <div class="d-flex justify-content-between align-items-center">
                            <div class="small text-muted">
                                <i class="bi bi-book me-1"></i>
                                <span th:text="${collection.bookCount}">0</span> книг
                            </div>
                            <a th:href="@{/collections/{id}(id=${collection.id})}" class="btn btn-sm btn-outline-success">
                                <i class="bi bi-eye me-1"></i>Перейти
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Если нет коллекций -->
    <div th:unless="${collections != null and !collections.isEmpty()}" class="text-center py-5">
        <i class="bi bi-collection fs-1 text-muted"></i>
        <p class="text-muted mt-3 mb-0">У вас ещё нет коллекций</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
