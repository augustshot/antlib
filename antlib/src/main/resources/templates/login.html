<!DOCTYPE html>
<html lang="ru"
      xmlns = "http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" type="text/javascript"></script>
    <script th:src="@{/js/loginValidation.js}" type="text/javascript"></script>
</head>
<body class="bg-light">
<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow">

                <div class="card-body p-4">
                    <h2 class="text-center text-success mb-4">Вход</h2>

                    <!-- Форма входа -->
                    <form id="login-form" th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="login" class="form-label">Имя пользователя</label>
                            <input id="login" class="form-control" name="username" placeholder="Введите имя пользователя" />
                            <div id="username-error" class="text-danger small mt-1 d-none"></div>
                        </div>
                        <div class="mb-3">
                            <label for="pass" class="form-label">Пароль</label>
                            <input id="pass" type="password" class="form-control" name="password" placeholder="Введите пароль" />
                            <div id="password-error" class="text-danger small mt-1 d-none"></div>
                        </div>

                        <div id="errors_login" class="alert alert-danger" th:if="${param.error != null and param.error[0] == 'true'}">
                             Неверный логин или пароль
                        </div>

                        <button type="button" id="submit-button" class="btn btn-success w-100 mt-3">Войти</button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-muted">Нет аккаунта?</span>
                        <a th:href="@{/register}" class="text-success ms-1">Зарегистрироваться</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
