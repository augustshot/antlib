<!DOCTYPE html>
<html lang="ru"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Мои книги</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/books.css}" rel="stylesheet"/>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<div class="container mt-4">
    <!-- Заголовок и кнопка в одной строке -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success mb-0">Мои книги</h2>
        <a th:href="@{/books/add}" class="btn btn-outline-success px-4 py-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Добавить книгу
        </a>
    </div>

    <!-- Фильтры (закомментированы, как в оригинале) -->
    <div class="card mb-4">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">Фильтры</h5>
        </div>
        <div class="card-body">
            <form method="get" action="#" th:action="@{/books}" class="row g-2 align-items-end">
                <!-- Название -->
                <div class="col">
                    <label for="title" class="form-label">Название</label>
                    <input type="text" class="form-control form-control-sm" id="title" name="title" th:value="${param.title}" placeholder="Введите название">
                </div>

                <!-- Автор -->
                <div class="col">
                    <label for="author" class="form-label">Автор</label>
                    <input type="text" class="form-control form-control-sm" id="author" name="author" th:value="${param.author}" placeholder="Введите автора">
                </div>

                <!-- Оценка -->
                <div class="col">
                    <label class="form-label">Оценка</label>
                    <div class="d-flex gap-1 align-items-center">
                        <select class="form-select form-select-sm" id="ratingFrom" name="ratingFrom" style="width: 75px;">
                            <option value="">от</option>
                            <option th:each="r : ${#numbers.sequence(1, 5)}" th:value="${r}" th:text="${r}">1</option>
                        </select>
                        <select class="form-select form-select-sm" id="ratingTo" name="ratingTo" style="width: 75px;">
                            <option value="">до</option>
                            <option th:each="r : ${#numbers.sequence(1, 5)}" th:value="${r}" th:text="${r}">5</option>
                        </select>
                    </div>
                </div>

                <!-- Источник -->
                <div class="col">
                    <label for="source" class="form-label">Источник</label>
                    <select class="form-select form-select-sm" id="source" name="source">
                        <option value="">Все</option>
                        <option th:each="src : ${sources}" th:value="${src}" th:text="${src.value}">EBOOK</option>
                    </select>
                </div>

                <!-- Статус -->
                <div class="col">
                    <label for="status" class="form-label">Статус</label>
                    <select class="form-select form-select-sm" id="status" name="status">
                        <option value="">Все</option>
                        <option th:each="st : ${statuses}" th:value="${st}" th:text="${st.value}">READING</option>
                    </select>
                </div>

                <!-- Кнопка -->
                <div class="col-auto">
                    <button type="submit" class="btn btn-success btn-sm px-3">Показать</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Сетка карточек: 6 карточек в строке -->
    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-6 g-4">
        <div th:each="userBookMark : ${page.content}" class="col">
            <div class="card book-card">
                <!-- Обложка -->
                <th:block th:if="${userBookMark.bookDescription.cover != null}">
                    <img th:src="${userBookMark.bookDescription.cover}"
                         class="card-img-top book-cover"
                         alt="Обложка книги"
                         onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="book-cover-placeholder" style="display: none;">
                        📖
                    </div>
                </th:block>
                <th:block th:unless="${userBookMark.bookDescription.cover != null}">
                    <div class="book-cover-placeholder">
                        📖
                    </div>
                </th:block>

                <div class="card-body">
                    <!-- Название -->
                    <div class="book-title">
                        <a th:href="@{/books/{id}(id=${userBookMark.id})}"
                           th:text="${userBookMark.bookDescription.title}">
                            Название книги
                        </a>
                    </div>

                    <!-- Автор -->
                    <div class="book-author">
                        <a
                           th:text="${userBookMark.bookDescription.author}">
                            Автор
                        </a>
                    </div>

                    <!-- Статус -->
                    <div class="book-detail">
                        <span class="book-detail-label">Статус:</span>
                        <span th:text="${userBookMark.status.value}"></span>
                    </div>

                    <!-- Оценка (звёздами или числом) -->
                    <div class="book-detail">
                        <span class="book-detail-label">Оценка:</span>
                        <span th:if="${userBookMark.rating != null}" class="book-rating">
                            <span class="text-muted ms-1"><span th:text="${userBookMark.rating}"></span> из 5</span>
                        </span>
                        <span th:unless="${userBookMark.rating != null}">—</span>
                    </div>

                    <!-- Источник -->
                    <div class="book-detail">
                        <span class="book-detail-label">Источник:</span>
                        <span th:text="${userBookMark.source.value}"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <div th:unless="${page.totalPages < 2}" class="pagination-container text-center mt-4">
        <nav>
            <ul class="pagination justify-content-center">
                <li th:class="${page.first} ? 'page-item disabled' : 'page-item'">
                    <a th:if="!page.first"
                       th:href="@{/books(page=${page.number - 1})}"
                       class="page-link">Назад</a>
                    <span th:if="${page.first}" class="page-link">Назад</span>
                </li>

                <li class="page-item disabled">
                    <span class="page-link">
                        <span th:text="${page.number + 1}"></span> / <span th:text="${page.totalPages}"></span>
                    </span>
                </li>

                <li th:class="${page.last} ? 'page-item disabled' : 'page-item'">
                    <a th:if="!page.last"
                       th:href="@{/books(page=${page.number + 1})}"
                       class="page-link">Далее</a>
                    <span th:if="${page.last}" class="page-link">Далее</span>
                </li>
            </ul>
        </nav>
    </div>
</div>

</body>
</html>
