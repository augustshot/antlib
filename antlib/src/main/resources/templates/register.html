<!DOCTYPE html>
<html lang="ru"
      xmlns = "http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script th:src="@{/js/registerValidation.js}" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" type="text/javascript"></script>
</head>
<body class="d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="auth-card">

                <h2 class="text-center text-success mb-4">Регистрация</h2>

                <!-- Форма регистрации -->
                <form id="register-form" th:action="@{/register}" method="post">
                    <div class="form-group mb-3">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <input id="username" name="username" class="form-control" placeholder="Введите имя пользователя" />
                        <div id="username-error" class="text-danger small mt-1 d-none"></div>
                    </div>
                    <div class="form-group mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input id="email" name="email" type="email" class="form-control" placeholder="example@email.com" />
                        <div id="email-error" class="text-danger small mt-1 d-none"></div>
                    </div>
                    <div class="form-group mb-3">
                        <label for="reg-pass" class="form-label">Пароль</label>
                        <input id="reg-pass" type="password" name="password" class="form-control" placeholder="Введите пароль" />
                        <div id="password-error" class="text-danger small mt-1 d-none"></div>
                    </div>
                    <div class="form-group mb-3">
                        <label for="confirm-pass" class="form-label">Подтверждение пароля</label>
                        <input id="confirm-pass" type="password" name="confirmPassword" class="form-control" placeholder="Повторите пароль" />
                        <div id="confirm-error" class="text-danger small mt-1 d-none"></div>
                    </div>


                    <button type="button" id="submit-button" class="btn btn-success w-100 btn-success-custom mt-3">Зарегистрироваться</button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Уже есть аккаунт?</span>
                    <a th:href="@{/login}" class="switch-link ms-1 text-success">Войти</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
