<!DOCTYPE html>
<html lang="ru"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мой профиль</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/profile.css}">
</head>
<body>

<!-- Подключение header -->
<div th:replace="~{header :: header}"></div>

<div class="container mt-4">
  <!-- Заголовок -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-success mb-0">Мой профиль</h2>
  </div>

  <div class="row">
    <!-- ЛЕВАЯ КОЛОНКА -->
    <div class="col-lg-4 mb-4">
      <div class="card">
        <div class="card-body text-center">
          <!-- Значок профиля -->
          <div class="profile-avatar">
            <i class="fas fa-user"></i>
          </div>

          <!-- Имя -->
          <h5 class="mb-1" th:text="${user.username} ?: 'Читатель'">Читатель</h5>

          <!-- Почта -->
          <p class="text-muted small mb-2">
            <i class="far fa-envelope me-1"></i>
            <span th:text="${user.email} ?: 'reader@antlib.ru'">reader@antlib.ru</span>
          </p>

          <!-- Дата регистрации -->
          <p class="text-muted small mb-3">
            <i class="fas fa-calendar-alt me-1"></i>
            Зарегистрирован:
            <span th:text="${#temporals.format(user.dateJoin, 'dd.MM.yyyy')} ?: '01.01.2024'">01.01.2024</span>
          </p>

          <!-- Кнопка редактировать профиль -->
          <a th:href="@{/profile/edit}" class="btn btn-success w-100">
            <i class="fas fa-edit me-2"></i>Редактировать профиль
          </a>
        </div>
      </div>
    </div>

    <!-- ПРАВАЯ КОЛОНКА -->
    <div class="col-lg-8">
      <!-- Статистика по категориям статуса чтения -->
      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title text-success mb-3">
            <i class="fas fa-chart-simple me-2"></i>Статистика чтения
          </h5>

          <div class="row g-3">
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${read} ?: 0">0</div>
                <div class="stat-label">Прочитано</div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${reading} ?: 0">0</div>
                <div class="stat-label">Читаю сейчас</div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${planned} ?: 0">0</div>
                <div class="stat-label">Хочу прочитать</div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${postponed} ?: 0">0</div>
                <div class="stat-label">Отложено</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Блок "Отчеты" с карточками -->
      <div class="card">
        <div class="card-body">
          <h5 class="card-title text-success mb-3">
            Отчеты
          </h5>

          <div class="row g-3">
            <!-- За месяц -->
            <div class="col-md-4">
              <div class="report-card" id="reportMonthBtn">

                <h6 class="mb-1">За месяц</h6>
                <p>Статистика за последние 30 дней</p>
              </div>
            </div>

            <!-- За год -->
            <div class="col-md-4">
              <div class="report-card" id="reportYearBtn">

                <h6 class="mb-1">За год</h6>
                <p>Итоги текущего года</p>
              </div>
            </div>

            <!-- Свои даты -->
            <div class="col-md-4">
              <div class="report-card" id="reportCustomBtn">
                <h6 class="mb-1">Свои даты</h6>
                <p>Выберите период</p>
              </div>
            </div>
          </div>

          <!-- Область для вывода отчета -->
          <div class="mt-4" id="reportResult" style="display: none;">
            <hr>
            <div id="reportContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Модальное окно для выбора своих дат -->
<div class="modal fade" id="customDateModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="fas fa-calendar-range me-2"></i>Выбрать период
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
      </div>
      <div class="modal-body">
        <label class="form-label fw-bold">Дата начала</label>
        <input type="date" class="form-control mb-3" id="startDate"/>

        <label class="form-label fw-bold">Дата окончания</label>
        <input type="date" class="form-control" id="endDate"/>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="button" class="btn btn-success" id="applyCustomDate">Показать</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Данные для демонстрации (в реальном приложении будут с сервера)
  const mockData = {
      month: { count: 3, books: ['Тень и кость', '1984', 'Маленькая жизнь'] },
      year: { count: 14, books: ['Тень и кость', '1984', 'Маленькая жизнь', 'Гарри Поттер', 'Преступление и наказание'] }
  };

  function showReport(title, data) {
      const reportDiv = document.getElementById('reportResult');
      const contentDiv = document.getElementById('reportContent');

      let booksHtml = '<ul class="mb-0">';
      data.books.forEach(book => {
          booksHtml += `<li>${book}</li>`;
      });
      booksHtml += '</ul>';

      contentDiv.innerHTML = `
          <h6 class="text-success mb-2"><i class="fas fa-chart-simple me-1"></i> ${title}</h6>
          <p class="mb-2">За этот период вы прочитали <strong>${data.count}</strong> книг(и)</p>
          <div class="mt-2">
              <span class="fw-bold">Книги:</span>
              ${booksHtml}
          </div>
      `;

      reportDiv.style.display = 'block';
  }

  // Отчет за месяц
  document.getElementById('reportMonthBtn').addEventListener('click', function() {
      showReport('Отчет за месяц', mockData.month);
  });

  // Отчет за год
  document.getElementById('reportYearBtn').addEventListener('click', function() {
      showReport('Отчет за год', mockData.year);
  });

  // Отчет за свои даты
  const customBtn = document.getElementById('reportCustomBtn');
  const modal = new bootstrap.Modal(document.getElementById('customDateModal'));

  customBtn.addEventListener('click', function() {
      modal.show();
  });

  document.getElementById('applyCustomDate').addEventListener('click', function() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;

      if (!start || !end) {
          alert('Пожалуйста, выберите обе даты');
          return;
      }

      showReport(`Отчет за период ${start} — ${end}`, mockData.month);
      modal.hide();
  });
</script>

</body>
</html>
