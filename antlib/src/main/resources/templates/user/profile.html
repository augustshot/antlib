<!DOCTYPE html>
<html lang="ru"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мой профиль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
  <link rel="stylesheet" th:href="@{/css/profile.css}">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-success mb-0">Мой профиль</h2>
  </div>

  <div class="row">
    <div class="col-lg-4 mb-4">
      <div class="card">
        <div class="card-body text-center">
          <div class="profile-avatar">
          </div>

          <h5 class="mb-1" th:text="${user.username} ?: 'Читатель'">Читатель</h5>

          <p class="text-muted small mb-2">
            <span th:text="${user.email} ?: 'reader@antlib.ru'">reader@antlib.ru</span>
          </p>

          <p class="text-muted small mb-3">
            Зарегистрирован:
            <span th:text="${#temporals.format(user.dateJoin, 'dd.MM.yyyy')} ?: '01.01.2024'">01.01.2024</span>
          </p>

          <a th:href="@{/profile/edit}" class="btn btn-success w-100">
            Редактировать профиль
          </a>
        </div>
      </div>
    </div>

    <div class="col-lg-8">
      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title text-success mb-3">
            Статистика чтения
          </h5>

          <div class="row g-3">
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${read} ?: 0">0</div>
                <div class="stat-label">Прочитано</div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${reading} ?: 0">0</div>
                <div class="stat-label">Читаю сейчас</div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${planned} ?: 0">0</div>
                <div class="stat-label">Хочу прочитать</div>
              </div>
            </div>
            <div class="col-3">
              <div class="stat-card">
                <div class="stat-number" th:text="${postponed} ?: 0">0</div>
                <div class="stat-label">Отложено</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h5 class="card-title text-success mb-3">
            Отчеты
          </h5>
          <div class="mb-3">
            <span class="text-muted small">
              Скачивание в формате .xslx
            </span>
          </div>

          <div class="row g-3">
            <div class="col-md-4">
              <a th:href="@{/profile/downloadReport/books}" class="text-decoration-none">
                <div class="report-card">
                  <h6 class="mb-1 text-success">Все книги</h6>
                </div>
              </a>
            </div>

            <div class="col-md-4">
              <a th:href="@{/profile/downloadReport/stats}" class="text-decoration-none">
                <div class="report-card">
                  <h6 class="mb-1 text-success">Подробная статистика</h6>
                </div>
              </a>
            </div>
          </div>
      </div>
    </div>
  </div>
</div>




</div>
</body>
</html>
